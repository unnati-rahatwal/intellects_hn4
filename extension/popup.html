<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 450px; height: 600px; margin: 0; background-color: #0A0F1C; color: #cbd5e1;
      font-family: system-ui, -apple-system, sans-serif; display: flex; flex-direction: column; overflow: hidden;
    }
    .header { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); background-color: #0F1629; display: flex; align-items: center; gap: 12px; }
    .header h1 { margin: 0; font-size: 18px; color: white; }
    .header span { font-weight: normal; color: #64748b; font-size: 12px; background: rgba(34,211,238,0.1); padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(34,211,238,0.2); }
    
    .tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.1); background-color: #0F1629; }
    .tab { flex: 1; padding: 12px 0; background: none; border: none; color: #64748b; font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .tab:hover { color: #cbd5e1; }
    .tab.active { color: #22d3ee; border-bottom: 2px solid #22d3ee; }
    
    .tab-content { display: none; flex: 1; overflow-y: auto; padding: 20px; }
    .tab-content.active { display: block; }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    
    .footer { padding: 16px; border-top: 1px solid rgba(255,255,255,0.1); background-color: #0F1629; }
    button.primary-btn {
      width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
      background-color: #0891b2; color: white; font-size: 15px; box-shadow: 0 0 15px rgba(8,145,178,0.3); transition: all 0.2s;
    }
    button.primary-btn:hover { background-color: #06b6d4; }
    button.primary-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .empty-state { text-align: center; margin-top: 40px; color: #94a3b8; font-size: 14px; line-height: 1.5; }
    .loading-state { display: none; text-align: center; margin-top: 60px; color: #38bdf8; font-weight: 500; font-size: 14px; }
    @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }
    .loading-icon { display: inline-block; animation: pulse 1.5s infinite; font-size: 24px; margin-bottom: 16px; }
    
    .issue-card { background-color: #111827; border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 16px; margin-bottom: 12px; }
    .issue-critical { border-left: 3px solid #ef4444; }
    .issue-warning { border-left: 3px solid #f59e0b; }
    .issue-title { margin: 0 0 4px 0; color: #e2e8f0; font-size: 14px; font-weight: 600; }
    .issue-desc { margin: 0 0 8px 0; color: #94a3b8; font-size: 12px; line-height: 1.4; }
    .issue-selector { display: inline-block; background-color: #0A0F1C; border: 1px solid rgba(255,255,255,0.1); padding: 4px 6px; border-radius: 4px; font-family: monospace; color: #34d399; font-size: 10px; word-break: break-all; }

    .metric-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #111827; border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 8px; }
    .metric-label { font-size: 13px; font-weight: 600; color: #e2e8f0; }
    .metric-value { font-size: 13px; font-family: monospace; color: #34d399; background: #0A0F1C; padding: 4px 8px; border-radius: 4px; }
    .metric-pass { color: #34d399; }
    .metric-fail { color: #ef4444; }
    .metric-warn { color: #f59e0b; }

    /* ORG TREE CSS */
    .org-wrapper { overflow-x: auto; padding: 24px 20px; display: flex; justify-content: flex-start; min-width: 100%; border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; background: rgba(0,0,0,0.2); }
    .org-tree * { box-sizing: border-box; }
    .org-tree { display: inline-flex; flex-direction: column; align-items: center; position: relative; margin: 0 auto; }
    .org-node { background: #111827; border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 8px; text-align: center; position: relative; z-index: 2; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
    .org-children { display: flex; justify-content: center; padding-top: 20px; position: relative; gap: 24px; }
    .org-children::before { content: ''; position: absolute; top: 0; left: 50%; border-left: 2px solid #475569; width: 0; height: 20px; margin-left: -1px; }
    .org-child { position: relative; padding-top: 20px; display: flex; flex-direction: column; align-items: center; }
    .org-child::before { content: ''; position: absolute; top: 0; left: 50%; border-left: 2px solid #475569; width: 0; height: 20px; margin-left: -1px; }
    .org-child::after { content: ''; position: absolute; top: 0; width: 100%; border-top: 2px solid #475569; left: 0; }
    .org-child:first-child::after { left: 50%; width: 50%; }
    .org-child:last-child::after { right: 50%; width: 50%; left: auto; }
    .org-child:only-child::after { display: none; }
    .issue-node { cursor: pointer; transition: all 0.2s; min-width: 160px; max-width: 240px; white-space: normal; text-align: left; }
    .issue-node:hover { background: #1e293b; border-color: #0891b2 !important; box-shadow: 0 0 15px rgba(8,145,178,0.4); transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="header">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="16" cy="4" r="1"/><rect width="6" height="12" x="13" y="8" rx="1"/><path d="M14 20h4"/><path d="m5 16 3-3V8"/><path d="M5 8h4"/></svg>
    <h1>AccessIQ <span>Lighthouse V3</span></h1>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="ai">AI Audits</button>
    <button class="tab" data-tab="perf">Performance</button>
    <button class="tab" data-tab="seo">SEO</button>
    <button class="tab" data-tab="bp">Best Practices</button>
  </div>

  <div id="ai" class="tab-content active">
    <div id="empty-state" class="empty-state">
       <div style="font-size: 32px; margin-bottom: 16px;">🔍</div>
       Ready to securely scan the current tab for WCAG 2.2 accessibility violations.
    </div>
    
    <div id="loading-state" class="loading-state">
       <div class="loading-icon">⏳</div><br />
       Analyzing Context via AI...
    </div>

    <div id="error-state" style="display:none; color: #fca5a5; background: rgba(239,68,68,0.1); padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; border: 1px solid rgba(239,68,68,0.2); font-family: monospace; max-height: 200px; overflow-y: auto;"></div>
    
    <div id="issues-list" style="display:none;"></div>
  </div>

  <div id="perf" class="tab-content">
    <div class="empty-state run-prompt">Run an audit to view Core Web Vitals.</div>
    <div id="perf-metrics" style="display:none;"></div>
  </div>

  <div id="seo" class="tab-content">
    <div class="empty-state run-prompt">Run an audit to view SEO health.</div>
    <div id="seo-metrics" style="display:none;"></div>
  </div>

  <div id="bp" class="tab-content">
    <div class="empty-state run-prompt">Run an audit to view Modern Best Practices.</div>
    <div id="bp-metrics" style="display:none;"></div>
  </div>

  <div class="footer">
    <button id="audit-btn" class="primary-btn">Run Lighthouse Audit</button>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
